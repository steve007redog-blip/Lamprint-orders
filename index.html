<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ink & Supplies Order Form</title>

    <link rel="stylesheet" href="css/bootstrap.min.css">

    <style>
        .autocomplete-list {
            position: absolute;
            background: white;
            border: 1px solid #ccc;
            width: 100%;
            max-height: 150px;
            overflow-y: auto;
            z-index: 10;
        }
        .autocomplete-item {
            padding: 6px;
            cursor: pointer;
        }
        .autocomplete-item:hover {
            background: #f0f0f0;
        }
    </style>
</head>

<body class="p-4">

    <!-- ============================
         PAGE HEADER + NAVIGATION
    ============================= -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="m-0">Ink & Supplies Order Form</h2>

        <button class="btn btn-secondary" onclick="window.location.href='orders.html'">
            View All Orders
        </button>
    </div>

    <!-- ============================
         ORDER HEADER SECTION
    ============================= -->
    <div class="row mb-3">

        <div class="col-md-3">
            <label>Order Number</label>
            <input id="orderNumber" class="form-control" readonly>
        </div>

        <div class="col-md-3">
            <label>Date</label>
            <input id="orderDate" type="date" class="form-control">
        </div>

        <div class="col-md-3">
            <label>Supplier</label>
            <select id="supplier" class="form-control"></select>
        </div>

        <div class="col-md-3">
            <label>Status</label>
            <select id="orderStatus" class="form-control">
                <option>Pending</option>
                <option>Partially Supplied</option>
                <option>Fully Supplied</option>
            </select>
        </div>

    </div>

    <!-- ============================
         ITEMS TABLE
    ============================= -->
    <h4>Items to Order</h4>

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Item Type</th>
                <th>Code</th>
                <th>Description</th>
                <th>Qty</th>
                <th>Expected Date</th>
                <th>Remove</th>
            </tr>
        </thead>

        <tbody id="itemsBody">
            <!-- Rows injected by JS -->
        </tbody>
    </table>

    <button id="addItemRow" class="btn btn-success mb-3">Add Item</button>
    <button id="clearItems" class="btn btn-danger mb-3">Clear All Items</button>

    <!-- ============================
         COMMENTS SECTION
    ============================= -->
    <div class="mb-3">
        <label>General Comments</label>
        <textarea id="orderComments" class="form-control" rows="2"></textarea>
    </div>

    <!-- ============================
         ACTION BUTTONS
    ============================= -->
    <div class="d-flex gap-3">
        <button id="saveOrder" class="btn btn-primary">Save Order</button>
        <button id="sendEmail" class="btn btn-info">Send Email</button>
    </div>

    <!-- ============================
         MAIN SCRIPT (POINTS TO mainv2.js)
    ============================= -->
    <script src="js/mainv2.js?v=1"></script>

</body>
</html>
